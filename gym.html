<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Mambership Portal</title>
    <style>
        body
        {
            background-color: rgb(188, 213, 235);
        }
        h1
        {
            text-align: center;
            
        }
        .main
        {
            margin-left: 400px;
            margin-right: 500px;
            border-radius: 10px;
            background-color: rgb(220, 220, 210);
        }
        div img
        {
            width: 595px;
            border-radius: 5px;
        }
        select
        {
            width: 570px;
            font-size: 20px;
            padding-bottom: 5px;
            border-radius: 5px;
        }
        meter
        {
            width: 570px;
        }
        textarea
        {
            width: 570px;
            padding-bottom: 100px;
            border-radius: 5px;
        }
        form
        {
            margin-left: 10px;
            font-size: 25px;
        }
        input
        {
            margin-top: 3px;
            font-size: 20px;
            margin-left: 10px; 
            border-radius: 5px;
        }
        .button1
        {
            font-size: 25px;
            width: 570px;
            border-radius: 15px;
            margin: 10px;
            background-color: rgb(38, 72, 241);
        }
        .button2
        {
            font-size: 25px;
            width: 570px;
            border-radius: 15px;
            margin: 10px;
            background-color: rgb(241, 43, 33);
        }
        .medical-report 
        {
            width: 530px;
            border: 1px solid black;
            padding: 8px;
            border-radius: 4px; 
        }
    </style>
</head>
<body>
    <div class="main">
        <div>
            <h1>🏋️ Gym Membership Portal</h1>
        </div>
        <div>
            <img src="../images/Gym.jpg">
        </div>
        <div>
            <form>
                <label for="name">Member Name</label><br>
                <input type="text" placeholder="Enter Member Name" style="width: 550px;"><br>
                <label for="Password">Password</label><br>
                <input type="password" placeholder="Enter Password" style="width: 550px;"><br>
                <label for="Gender">Gender</label><br>
                <input type="radio" name="gender" value="Male" checked style="width: 30px;">Male
                <input type="radio" name="gender" style="width: 35px;">Female
                <input type="radio" name="gender" style="width: 23px;">Other
                <br>
                <label for="Fitness Goals">Fitness Goals</label><br>
                <input type="checkbox" name="terms" style="width: 23px;">Weight Loss
                <input type="checkbox" name="terms" style="width: 23px;">Muscle Gain
                <br>
                <input type="checkbox" name="terms" style="width: 23px;">Strength
                <input type="checkbox" name="terms" style="width: 23px;">Cardio
                <br>
                <label for="Membership Plan">Membership Plan</label><br>
                <select>
                    <option>Select Plan</option>
                    <option>Monthly</option>
                    <option>Weekly</option>
                    <option>yearly</option>
                </select>
                <br>
                <label for="Joining Date">Joining Date</label><br>
                <input type="date" style="width: 550px;"><br>
                <label for="Workout Time"> Workout Time</label><br>
                <input type="time" style="width: 550px;"><br>
                <label for="color">Theme Color</label><br>
                <input type="color" style="width: 550px; "><br>
                <label for="medicalReport">Upload Medical Report</label><br>
                <input type="file" id="medicalReport" class="medical-report"><br>
                <label for="Health Notes">Health Notes</label><br>
                <textarea type="text" placeholder="Enter your health details...."></textarea><br>
                <label for="BMI Meter">BMI Meter</label><br>
                <meter min="1" max="100" value ="50"></meter><br>
                <label for="Registration Progress">Registration Progress</label><br>
                <meter min="1" max="100" value ="70" low="30" high="80"></meter><br>
                <hr>
                <button class="button1">Join Now</button>
                <button class="button2">Reset</button>
            </form>
        </div>
    </div>
</body>
</html>
