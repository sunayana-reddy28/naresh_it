<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body
        {
            background-color: rgb(178, 199, 239);
        }
        .main
        {
            padding-top: 30px;
            box-shadow: 5px 5px rgb(198, 142, 142);
            background-color: white;
            margin-left: 500px;
            border: 1px solid black;
            margin-right: 400px;
            border-radius: 5px;
            width: 400px;
            height: 500px;
            padding-bottom: 30px;
        }
        div h1
        {
            text-align: center;
            font-size: 30px;
            color: rgb(35, 79, 225);
        }
        form
        {
            font-size: 20px;
            margin: 5px;
        }

        /* Student ID */
        #student
        {
            margin-top: 20px;
            width: 350px;
            margin: 5px;
            font-size: 15px;
            height: 40px;
            border-radius: 5px;
            background-color: rgb(189, 183, 175);
        }

        /* Name */
        #name
        {
            margin-top: 20px;
            width: 350px;
            margin: 5px;
            font-size: 15px;
            height: 40px;
            border-radius: 5px;
        }

        #name:valid
        {
            border:2px solid green;
            border-left:5px solid green;
            background-color:rgb(239,130,186);
        }

        #name:invalid:not(:placeholder-shown)
        {
            border:2px solid salmon;
            border-left:5px solid red;
        }

        /* Email */
        #email1
        {
            margin-top:20px;
            width:350px;
            margin:5px;
            font-size:15px;
            height:40px;
            border-radius:5px;
        }

        #email1:valid
        {
            border:2px solid green;
            border-left:5px solid green;
            background-color:rgb(239,130,186);
        }

        #email1:invalid:not(:placeholder-shown)
        {
            border:2px solid salmon;
            border-left:5px solid red;
        }

        /* Age */
        #age
        {
            margin-top:20px;
            width:350px;
            margin:5px;
            font-size:15px;
            height:40px;
            border-radius:5px;
        }

        #age:valid
        {
            border:2px solid green;
            border-left:5px solid green;
            background-color:lightgreen;
        }

        #age:invalid:not(:placeholder-shown)
        {
            border:2px solid salmon;
            border-left:5px solid red;
            background-color:white;
        }

        /* Checkbox */
        .checkbox
        {
            display:flex;
            align-items:center;
            gap:8px;
            margin:15px 5px;
        }

        .checkbox input
        {
            width:auto;
            accent-color:green;
        }

        /* Text Red Before Click */
        #check + label
        {
            color:red;
            font-weight:bold;
        }

        /* Text Green After Click */
        #check:checked + label
        {
            color:green;
        }

        /* Button */
        button
        {
            width:350px;
            background-color:blue;
            border-radius:50px;
            height:50px;
            margin:5px;
            margin-left:15px;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover
        {
            background-color:rgb(51,233,27);
            font-size:22px;
        }

    </style>
</head>

<body>

<div class="main">

    <h1>Student Registration Form</h1>

    <form>

        <label>Student ID</label><br>
        <input type="text" id="student" value="STD2026001" readonly><br>

        <label>Full Name</label>
        <input type="text"
               placeholder="Enter Full Name"
               id="name"
               pattern="[A-Za-z ]{3,30}"
               required><br>

        <label>Email</label>
        <input type="email"
               id="email1"
               placeholder="Enter Email"
               required><br>

        <label>Age</label>
        <input type="number"
               id="age"
               placeholder="Enter Age"
               min="18"
               max="100"
               required><br>

        <div class="checkbox">
            <input type="checkbox" id="check" required>
            <label for="check">I Accept Terms &amp; Conditions</label>
        </div>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
